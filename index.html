<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json?v=2026-02-26-idx">
  <title>メンテログ</title>
  <style>
    html, body { height: 100%; }
    body {
      margin: 0;
      background: #0b0b0b;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
    }
    #boot {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
      opacity: 0.85;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div id="boot">読み込み中</div>

  <script>
    const BUILD = "2026-02-26-idx";

    (function() {
      const s = document.createElement("script");
      s.src = "app.js?v=" + encodeURIComponent(BUILD);
      s.defer = true;
      s.onload = function() {
        const boot = document.getElementById("boot");
        if (boot) boot.remove();
      };
      s.onerror = function() {
        const boot = document.getElementById("boot");
        if (boot) boot.textContent = "読み込み失敗";
      };
      document.head.appendChild(s);
    })();

    (function() {
      if (!("serviceWorker" in navigator)) return;
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("sw.js?v=" + encodeURIComponent(BUILD))
          .catch(function(){});
      });
    })();
  </script>
</body>
</html>
